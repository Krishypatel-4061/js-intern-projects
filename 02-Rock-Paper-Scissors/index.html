<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="game-container">
        <header>
            <h1>Rock, Paper, Scissors</h1>
            <p>Can you beat the computer?</p>
        </header>

        <div class="scoreboard">
            <div class="score-card user">
                <h2>You</h2>
                <span id="user-score" class="score-number">0</span>
            </div>
            <div class="score-divider">:</div>
            <div class="score-card computer">
                <h2>Computer</h2>
                <span id="comp-score" class="score-number">0</span>
            </div>
        </div>

        <div class="status-board">
            <p id="result-message">Make your move to start!</p>
            <div class="choices-display">
                <div class="choice-view user-choice" id="user-choice-display">❔</div>
                <div class="vs-text">VS</div>
                <div class="choice-view comp-choice" id="comp-choice-display">❔</div>
            </div>
        </div>

        <div class="controls">
            <button id="rock" class="choice-btn" data-choice="rock" aria-label="Rock">✊</button>
            <button id="paper" class="choice-btn" data-choice="paper" aria-label="Paper">✋</button>
            <button id="scissors" class="choice-btn" data-choice="scissors" aria-label="Scissors">✌️</button>
        </div>

        <button id="reset" class="reset-btn">Restart Game</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
