<!DOCTYPE html>
<html>
<header>
    <link rel="stylesheet" href="style.css">
</header>

<body>
    <h1>Task Manager</h1>
    <div id="task-add">
        <h3>Title</h3>
        <input type="text" id="task-title" value="">
        <br />
        <br />
        <h3>Description</h3>
        <br />
        <input type="text" id="task-description" value="">
        <br />
        <br />
        <h3>Status</h3>
        <input type="radio" id="pending" name="task-status" value="pending">
        <label for="pending">Pending</label>
        <br />
        <input type="radio" id="completed" name="task-status" value="completed">
        <label for="completed">Completed</label>
        <br />
        <br />
        <h3>Priority</h3>
        <input type="radio" id="high" name="task-pri" value="high">
        <label for="High">High</label>
        <br />
        <input type="radio" id="medium" name="task-pri" value="medium">
        <label for="Medium">Medium</label>
        <br />
        <input type="radio" id="low" name="task-pri" value="low">
        <label for="Low">Low</label>
        <br />
        <br />
        <button id="add" onclick="AddTasks()">Add Task</button>
        <br />
        <br />
        <br />
        <div id="task-operations">
            <h2>Task Lists</h2>
            <label for="search-task">Search Task</label>
            <input type="text" id="search-task">
            <button id="search" onclick="SearchTask()">Search Task</button>
            <button id="update" onclick="UpdateTask()">Update Task</button>
            <button id="delete" onclick="DeleteTask()">Delete Task</button>
            <br />
            <br />
        </div>
        <div id="task-sorting">
            <label for="task-filter">Filter By</label>
            <select name="task-pri" id="task-pri">
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
                <option value="All">All</option>
            </select>
            <select name="task-status" id="task-status">
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
                <option value="All">All</option>
            </select>
            <button id="filter" onclick="FilterTask()">Filter Task</button>
            <label for="task-sort">Sort By</label>
            <select name="task-sort" id="task-sort">
                <option value="title">Title</option>
                <option value="description">Description</option>
                <option value="status">Status</option>
                <option value="priority">Priority</option>
                <option value="time">Time</option>
            </select>
            <select name="order" id="order">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
            </select>
            <button id="sort" onclick="SortTask()">Sort Task</button>
            <br />
        </div>
        <div id="showtask">
            <ul id="task-list"></ul>
        </div>
        <div id="Desired-Output">
            <br />
            <h3>Total Task</h3>
            <p id="total-task"></p>
            <br />
            <h3>Completed Task</h3>
            <p id="completed-task"></p>
            <br />
            <h3>Pending Task</h3>
            <p id="pending-task"></p>
        </div>
        <script src="script.js"></script>
</body>

</html>
