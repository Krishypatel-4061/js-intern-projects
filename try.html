<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Storage Sandbox</title>
</head>

<body>
    <h2>Local Storage Sandbox</h2>

    <!-- The Input -->
    <label>Data to save:</label>
    <input type="text" id="dataInput" placeholder="Type something...">

    <br><br>

    <!-- The 4 Core Actions -->
    <button onclick="saveData()">1. setItem (Save)</button>
    <button onclick="loadData()">2. getItem (Load)</button>
    <button onclick="removeData()">3. removeItem (Delete One)</button>
    <button onclick="clearAll()">4. clear (Delete All)</button>

    <br><br>

    <!-- The Output -->
    <p><strong>Result from Storage:</strong> <span id="outputSpan">Nothing loaded yet.</span></p>

    <script>
        // ACTION 1: Save
        function saveData() {
            const val = document.getElementById('dataInput').value;
            localStorage.setItem('myTeachingKey', val);
            console.log("Saved:", val);
        }

        // ACTION 2: Load
        function loadData() {
            const savedValue = localStorage.getItem('myTeachingKey');
            const display = document.getElementById('outputSpan');

            if (savedValue !== null) {
                display.innerText = savedValue;
            } else {
                display.innerText = "NO DATA FOUND (It is null)";
            }
        }

        // ACTION 3: Remove Specific Item
        function removeData() {
            localStorage.removeItem('myTeachingKey');
            document.getElementById('outputSpan').innerText = "Data removed.";
        }

        // ACTION 4: Nuke Everything
        function clearAll() {
            localStorage.clear();
            document.getElementById('outputSpan').innerText = "All storage cleared.";
        }
    </script>
</body>

</html>
