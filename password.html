<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator</title>
    <link rel="stylesheet" href="password.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="app-container">
        <header>
            <h1>Password Generator</h1>
            <p>Generate secure, strong, and reliable passwords instantly.</p>
        </header>

        <section class="generator-section">
            <div class="password-display-box">
                <p id="password-display" class="placeholder">Select options to generate</p>
                <div class="actions">
                    <button id="copy-btn" class="icon-btn" aria-label="Copy" title="Copy to Clipboard">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                    <button id="save-btn" class="icon-btn" aria-label="Save" title="Save to Vault">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    </button>
                </div>
            </div>

            <div class="strength-meter">
                <div class="strength-bar-container">
                    <div id="strength-bar" class="strength-bar"></div>
                </div>
                <span id="strength-text">Strength: None</span>
            </div>

            <div class="controls-grid">
                <div class="control-group length-control">
                    <label for="length-slider">Length: <span id="length-val">16</span></label>
                    <input type="range" id="length-slider" min="4" max="50" value="16">
                </div>

                <div class="checkbox-grid">
                    <label class="checkbox-label">
                        <input type="checkbox" id="chk-uppercase" checked>
                        <span>Uppercase (A-Z)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="chk-lowercase" checked>
                        <span>Lowercase (a-z)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="chk-numbers" checked>
                        <span>Numbers (0-9)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="chk-symbols" checked>
                        <span>Symbols (@#$!)</span>
                    </label>
                </div>
            </div>

            <button id="generate-btn" class="primary-btn">Generate Password</button>
        </section>

        <section class="vault-section">
            <header class="vault-header">
                <h2>Password Vault</h2>
            </header>
            
            <div class="vault-tools">
                <input type="text" id="search-input" placeholder="Search passwords or labels...">
            </div>

            <div id="vault-list" class="vault-list">
                <!-- Saved passwords injected here -->
            </div>
        </section>
        
        <div id="toast" class="toast hidden">Message goes here</div>
        
        <!-- Modal for adding label -->
        <div id="label-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Save Password</h3>
                <p>Add an optional label to identify this password (e.g. Gmail, WiFi).</p>
                <input type="text" id="label-input" placeholder="Enter label">
                <div class="modal-actions">
                    <button id="cancel-save" class="secondary-btn">Cancel</button>
                    <button id="confirm-save" class="primary-btn">Save</button>
                </div>
            </div>
        </div>
    </main>

    <script src="password.js"></script>
</body>
</html>
