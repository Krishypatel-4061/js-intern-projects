<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="app-container">
        <div class="quote-card">
            <header>
                <h1>Daily Inspiration</h1>
                <p>Discover words that move you.</p>
            </header>

            <div class="quote-display">
                <div class="quote-icon">❝</div>
                <p id="quote">Press the button below to generate a new quote.</p>
                <p id="author" class="author"></p>
                
                <div class="action-buttons">
                    <button id="copy-btn" class="icon-btn" aria-label="Copy to clipboard" title="Copy to clipboard">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                    <button id="favorite-btn" class="icon-btn" aria-label="Save as favorite" title="Save as favorite">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    </button>
                </div>
            </div>

            <button id="generateQuote" class="primary-btn">Generate New Quote</button>
        </div>

        <div class="favorites-container">
            <h2>Saved Favorites</h2>
            <ul id="favorites-list" class="favorites-list">
                <!-- Favorites will be injected here -->
            </ul>
        </div>
        
        <div id="toast" class="toast hidden">Copied to clipboard!</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
